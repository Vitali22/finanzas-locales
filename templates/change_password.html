<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cambiar contraseña - Finanzas Locales</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Cambia tu contraseña</h1>
    <p>Por seguridad, reemplaza la contraseña inicial antes de usar la app.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <label>Nueva contraseña</label>
      <input type="password" name="password" minlength="6" required autofocus>
      <label>Confirmar contraseña</label>
      <input type="password" name="confirm_password" minlength="6" required>
      <button type="submit">Guardar y entrar</button>
    </form>
  </main>
</body>
</html>
